data:
  train_manifest: data/manifests/fsd50k/random_subset/train.csv
  val_manifest: data/manifests/fsd50k/random_subset/val.csv
  label_map_path: data/manifests/fsd50k/label_map.json

model:
  model_name: scratch_cnn
  num_labels: 200
  base_channels: 32
  dropout: 0.2

features:
  sample_rate: 16000
  clip_seconds: 10.0
  n_fft: 1024
  hop_length: 512
  n_mels: 128
  normalize_mode: per_sample

training:
  epochs: 2
  batch_size: 16
  eval_batch_size: 32
  num_workers: 4
  learning_rate: 0.001
  weight_decay: 0.01
  warmup_ratio: 0.05
  gradient_accumulation_steps: 1
  mixed_precision: "fp16"
  max_grad_norm: 1.0
  threshold: 0.5
  eval_every_steps: 100
  save_every_steps: 250
  log_every_steps: 10

runtime:
  output_dir: outputs/random_subset_scratch
  checkpoint_dir: outputs/random_subset_scratch/checkpoints
  seed: 42
  deterministic: false
  log_level: INFO

augmentation:
  waveform_augment: true
  spec_augment: true
