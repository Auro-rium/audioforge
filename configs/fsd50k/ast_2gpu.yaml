data:
  train_manifest: data/manifests/fsd50k/train.csv
  val_manifest: data/manifests/fsd50k/val.csv
  label_map_path: data/manifests/fsd50k/label_map.json
  max_train_samples:
  max_val_samples:

model:
  model_name: ast
  pretrained_name_or_path: MIT/ast-finetuned-audioset-10-10-0.4593
  num_labels: 200
  dropout: 0.1
  freeze_backbone: false
  use_lora: true
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  lora_target_modules: [query, value]

features:
  sample_rate: 16000
  clip_seconds: 10.0
  n_fft: 1024
  hop_length: 512
  n_mels: 128
  normalize_mode: per_sample

training:
  epochs: 5
  batch_size: 4
  eval_batch_size: 8
  num_workers: 8
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.05
  gradient_accumulation_steps: 4
  mixed_precision: "fp16"
  max_grad_norm: 1.0
  threshold: 0.5
  eval_every_steps: 1000
  save_every_steps: 2000
  log_every_steps: 25

runtime:
  output_dir: outputs/fsd50k/ast_2gpu
  checkpoint_dir: outputs/fsd50k/ast_2gpu/checkpoints
  seed: 42
  deterministic: false
  log_level: INFO

augmentation:
  waveform_augment: true
  spec_augment: false
